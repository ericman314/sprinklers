<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sprinklers · Login</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
           background: #342; color: white; font-family: arial, sans-serif; }
    form { display: grid; gap: 0.75rem; padding: 1.5rem 2rem;
           background: rgba(0,0,0,0.2); border-radius: 8px; min-width: 260px; }
    h1 { margin: 0 0 0.5rem; font-size: 1.25rem; text-align: center; }
    input, button { font: inherit; padding: 0.5rem 0.75rem; border-radius: 4px; border: 0; }
    button { background: #4a8; color: white; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .err { color: #fbb; min-height: 1.2em; font-size: 0.9em; }
  </style>
</head>
<body>
  <form id="login-form">
    <h1>Sprinklers</h1>
    <input id="password" type="password" autocomplete="current-password"
           placeholder="Password" autofocus required />
    <button id="submit" type="submit">Sign in</button>
    <div id="error" class="err" role="alert"></div>
  </form>
  <script>
    const form = document.getElementById('login-form')
    const errEl = document.getElementById('error')
    const btn = document.getElementById('submit')
    form.addEventListener('submit', async e => {
      e.preventDefault()
      errEl.textContent = ''
      btn.disabled = true
      try {
        const password = document.getElementById('password').value
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
          credentials: 'same-origin',
        })
        if (!res.ok) {
          errEl.textContent = 'Invalid password'
          return
        }
        location.href = '/'
      } catch (ex) {
        errEl.textContent = 'Network error'
      } finally {
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
